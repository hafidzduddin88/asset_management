<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if mode == 'edit' %}Edit{% else %}Add{% endif %} Assigned User - AMBP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50">
<div class="min-h-screen pb-20">
    <!-- Header -->
    <div class="bg-white shadow sticky top-0 z-10">
        <div class="px-4 py-3">
            <div class="flex items-center gap-3">
                <a href="/assigned-users" class="text-blue-600 hover:text-blue-900 text-lg">
                    <i class="fas fa-arrow-left"></i>
                </a>
                <h1 class="text-lg font-bold text-gray-900">
                    {% if mode == 'edit' %}Edit User{% else %}Add User{% endif %}
                </h1>
            </div>
        </div>
    </div>

    <!-- Form -->
    <div class="px-4 py-4">
        <div class="bg-white shadow rounded-lg p-4">
            {% if error %}
            <div class="bg-red-100 border border-red-400 text-red-700 px-3 py-2 rounded text-sm mb-4">
                {{ error }}
            </div>
            {% endif %}

            <form method="POST" class="space-y-4">
                <!-- Name -->
                <div>
                    <label for="assigned_user_name" class="block text-sm font-medium text-gray-700">User Name *</label>
                    <input 
                        type="text" 
                        id="assigned_user_name" 
                        name="assigned_user_name" 
                        required
                        value="{% if user %}{{ user.assigned_user_name }}{% endif %}"
                        class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-blue-500 focus:border-blue-500 text-base"
                        placeholder="John Doe"
                    >
                </div>

                <!-- Email -->
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700">Email</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email"
                        value="{% if user %}{{ user.email or '' }}{% endif %}"
                        class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-blue-500 focus:border-blue-500 text-base"
                        placeholder="john@example.com"
                    >
                </div>

                <!-- Phone -->
                <div>
                    <label for="phone" class="block text-sm font-medium text-gray-700">Phone</label>
                    <input 
                        type="tel" 
                        id="phone" 
                        name="phone"
                        value="{% if user %}{{ user.phone or '' }}{% endif %}"
                        class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-blue-500 focus:border-blue-500 text-base"
                        placeholder="+62 812 3456 7890"
                    >
                </div>

                <!-- Company -->
                <div>
                    <label for="company_name" class="block text-sm font-medium text-gray-700">Company</label>
                    <select 
                        id="company_name" 
                        name="company_name"
                        class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-blue-500 focus:border-blue-500 text-base"
                    >
                        <option value="">Select Company</option>
                        {% for company in companies %}
                        <option value="{{ company }}" {% if user and user.ref_companies and user.ref_companies.company_name == company %}selected{% endif %}>
                            {{ company }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <!-- Business Unit -->
                <div>
                    <label for="business_unit_name" class="block text-sm font-medium text-gray-700">Business Unit</label>
                    <select 
                        id="business_unit_name" 
                        name="business_unit_name"
                        class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-blue-500 focus:border-blue-500 text-base"
                    >
                        <option value="">Select Business Unit</option>
                        {% for bu in business_units %}
                        <option value="{{ bu }}" {% if user and user.ref_business_units and user.ref_business_units.business_unit_name == bu %}selected{% endif %}>
                            {{ bu }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <!-- Status -->
                <div>
                    <label for="status" class="block text-sm font-medium text-gray-700">Status *</label>
                    <select 
                        id="status" 
                        name="status"
                        required
                        class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-blue-500 focus:border-blue-500 text-base"
                    >
                        <option value="active" {% if not user or user.status == 'active' %}selected{% endif %}>Active</option>
                        <option value="inactive" {% if user and user.status == 'inactive' %}selected{% endif %}>Inactive</option>
                    </select>
                </div>

                <!-- Buttons -->
                <div class="flex gap-3 pt-4">
                    <button 
                        type="submit" 
                        class="flex-1 bg-blue-600 hover:bg-blue-700 text-white px-4 py-3 rounded-md text-base font-medium"
                    >
                        <i class="fas fa-save"></i> 
                        {% if mode == 'edit' %}Update{% else %}Add{% endif %}
                    </button>
                    <a href="/assigned-users" class="flex-1 bg-gray-300 hover:bg-gray-400 text-gray-900 px-4 py-3 rounded-md text-base font-medium text-center">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
