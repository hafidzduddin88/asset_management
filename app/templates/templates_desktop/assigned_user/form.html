<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if mode == 'edit' %}Edit{% else %}Add{% endif %} Assigned User - AMBP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50">
<div class="min-h-screen">
    <!-- Header -->
    <div class="bg-white shadow">
        <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
            <div class="flex items-center gap-4">
                <a href="/assigned-users" class="text-blue-600 hover:text-blue-900">
                    <i class="fas fa-arrow-left"></i>
                </a>
                <h1 class="text-2xl font-bold text-gray-900">
                    {% if mode == 'edit' %}Edit Assigned User{% else %}Add New Assigned User{% endif %}
                </h1>
            </div>
        </div>
    </div>

    <!-- Form -->
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="bg-white shadow rounded-lg p-6">
            {% if error %}
            <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
                {{ error }}
            </div>
            {% endif %}

            <form method="POST" class="space-y-6">
                <!-- Name -->
                <div>
                    <label for="assigned_user_name" class="block text-sm font-medium text-gray-700">User Name *</label>
                    <input 
                        type="text" 
                        id="assigned_user_name" 
                        name="assigned_user_name" 
                        required
                        value="{% if user %}{{ user.assigned_user_name }}{% endif %}"
                        class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500"
                        placeholder="e.g., John Doe"
                    >
                </div>

                <!-- Email -->
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700">Email</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email"
                        value="{% if user %}{{ user.email or '' }}{% endif %}"
                        class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500"
                        placeholder="john@example.com"
                    >
                </div>

                <!-- Phone -->
                <div>
                    <label for="phone" class="block text-sm font-medium text-gray-700">Phone</label>
                    <input 
                        type="tel" 
                        id="phone" 
                        name="phone"
                        value="{% if user %}{{ user.phone or '' }}{% endif %}"
                        class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500"
                        placeholder="+62 812 3456 7890"
                    >
                </div>

                <!-- Company -->
                <div>
                    <label for="company_id" class="block text-sm font-medium text-gray-700">Company</label>
                    <select 
                        id="company_id" 
                        name="company_id"
                        class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500"
                    >
                        <option value="">Select Company</option>
                        {% for company in companies %}
                        <option value="{{ company.company_id }}" {% if user and user.company_id == company.company_id %}selected{% endif %}>
                            {{ company.company_name }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <!-- Business Unit -->
                <div>
                    <label for="business_unit_id" class="block text-sm font-medium text-gray-700">Business Unit</label>
                    <select 
                        id="business_unit_id" 
                        name="business_unit_id"
                        class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500"
                    >
                        <option value="">Select Business Unit</option>
                        {% for bu in business_units %}
                        <option value="{{ bu.business_unit_id }}" {% if user and user.business_unit_id == bu.business_unit_id %}selected{% endif %}>
                            {{ bu.business_unit_name }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <!-- Status -->
                <div>
                    <label for="status" class="block text-sm font-medium text-gray-700">Status *</label>
                    <select 
                        id="status" 
                        name="status"
                        required
                        class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500"
                    >
                        <option value="active" {% if not user or user.status == 'active' %}selected{% endif %}>Active</option>
                        <option value="inactive" {% if user and user.status == 'inactive' %}selected{% endif %}>Inactive</option>
                    </select>
                </div>

                <!-- Buttons -->
                <div class="flex gap-4">
                    <button 
                        type="submit" 
                        class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-md flex items-center gap-2"
                    >
                        <i class="fas fa-save"></i> 
                        {% if mode == 'edit' %}Update{% else %}Add{% endif %} User
                    </button>
                    <a href="/assigned-users" class="bg-gray-300 hover:bg-gray-400 text-gray-900 px-6 py-2 rounded-md">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
