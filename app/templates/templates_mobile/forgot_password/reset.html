<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - AMBP</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-50 to-indigo-100 p-4">
    <div class="w-full max-w-sm space-y-6">
        <div>
            <h2 class="text-center text-2xl font-bold text-gray-900">
                Reset Password
            </h2>
            <p class="mt-2 text-center text-sm text-gray-600">
                Masukkan password baru Anda
            </p>
        </div>
        
        <form class="space-y-4" method="POST" action="/reset-password">
            <input type="hidden" name="access_token" value="{{ access_token }}">
            
            <div class="space-y-3">
                <div>
                    <label for="new_password" class="sr-only">Password Baru</label>
                    <input 
                        id="new_password" 
                        name="new_password" 
                        type="password" 
                        required 
                        minlength="6"
                        class="appearance-none rounded-lg block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 text-base" 
                        placeholder="Password Baru (min. 6 karakter)"
                    >
                </div>
                <div>
                    <label for="confirm_password" class="sr-only">Konfirmasi Password</label>
                    <input 
                        id="confirm_password" 
                        name="confirm_password" 
                        type="password" 
                        required 
                        minlength="6"
                        class="appearance-none rounded-lg block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 text-base" 
                        placeholder="Konfirmasi Password"
                    >
                </div>
            </div>

            <button 
                type="submit" 
                class="w-full flex justify-center py-2.5 px-4 border border-transparent text-base font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500"
            >
                Reset Password
            </button>

            <div class="text-center">
                <a href="/login" class="text-sm font-medium text-indigo-600 hover:text-indigo-500">
                    Kembali ke Login
                </a>
            </div>
        </form>
    </div>
</div>

<script>
    document.querySelector('form').addEventListener('submit', function(e) {
        const newPassword = document.getElementById('new_password').value;
        const confirmPassword = document.getElementById('confirm_password').value;
        
        if (newPassword !== confirmPassword) {
            e.preventDefault();
            alert('Password tidak cocok!');
        }
    });
</script>
</body>
</html>
