{% extends "templates_desktop/layouts/modern_layout.html" %}

{% block title %}Password Reset Successful{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8">
        <!-- Success Icon -->
        <div class="text-center">
            <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-green-100 mb-4">
                <i class="fas fa-check-circle text-green-600 text-xl"></i>
            </div>
            <h2 class="text-2xl font-extrabold text-gray-900">Password Reset Successful</h2>
            <p class="mt-2 text-sm text-gray-600">Your password has been reset successfully. You can now login with your new password.</p>
        </div>

        <!-- Action -->
        <div>
            <a href="/login" class="block w-full text-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-green-600 hover:bg-green-700">
                Go to Login
            </a>
        </div>
    </div>
</div>
{% endblock %}
