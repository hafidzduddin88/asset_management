{% extends "templates_mobile/layouts/modern_layout.html" %}

{% block title %}Forgot Password{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4">
    <div class="w-full max-w-sm space-y-6">
        <!-- Header -->
        <div class="text-center">
            <h2 class="text-2xl font-bold text-gray-900">Reset Password</h2>
            <p class="mt-2 text-sm text-gray-600">Enter your email to receive a reset link</p>
        </div>

        <!-- Form -->
        <form class="space-y-4" method="POST" action="/forgot-password/request">
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                <input id="email" name="email" type="email" required 
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                       placeholder="your@email.com">
            </div>

            <button type="submit" 
                    class="w-full py-2 px-4 bg-blue-600 text-white font-medium rounded-lg hover:bg-blue-700">
                Send Reset Link
            </button>

            <div class="text-center">
                <a href="/login" class="text-sm text-blue-600 hover:text-blue-500">Back to Login</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
